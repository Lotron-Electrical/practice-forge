services:
  - type: web
    name: practice-forge
    runtime: node
    buildCommand: cd client && npm install && npm run build && cd ../server && npm install
    startCommand: cd server && node src/index.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: ANALYSIS_SERVICE_URL
        sync: false
  - type: web
    name: practice-forge-analysis
    runtime: docker
    dockerfilePath: analysis-service/Dockerfile
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ANALYSIS_PORT
        value: 8001
